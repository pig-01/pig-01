<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <meta name="format-detection" content="telephone=no" />
  <title>蔡竣宇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f0f0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      width: 100%;
      background: #2c3e50;
      color: #fff;
      text-align: center;
      padding: 16px;
      font-size: 1.4rem;
      letter-spacing: 2px;
    }
    #pdf-container {
      width: 100%;
      max-width: 900px;
      padding: 16px;
    }
    canvas {
      display: block;
      margin: 0 auto 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      background: #fff;
      max-width: 100%;
    }
    #loading {
      text-align: center;
      padding: 40px;
      color: #555;
      font-size: 1rem;
    }
    footer {
      margin-top: auto;
      padding: 16px;
      text-align: center;
      font-size: 0.85rem;
      color: #888;
    }
    footer a { color: #3498db; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>蔡竣宇 — 個人履歷</header>
  <div id="pdf-container">
    <div id="loading">載入中，請稍候…</div>
  </div>
  <footer>
    <a href="your_document.pdf" download>下載 PDF</a>
    &nbsp;|&nbsp;
    <a href="https://felo.ai/page/preview/AgZxBSR6sD7cJPWtnWJU3w?business_type=AGENT_THREAD&invite=WPJlYkpWZL30m">訪問 Felo AI 頁面</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const container = document.getElementById('pdf-container');
    const loading   = document.getElementById('loading');

    pdfjsLib.getDocument('your_document.pdf').promise.then(function (pdf) {
      loading.remove();
      const renderPage = function (pageNum) {
        return pdf.getPage(pageNum).then(function (page) {
          const baseViewport = page.getViewport({ scale: 1 });
          const viewport = page.getViewport({ scale: Math.min(2, (container.clientWidth - 32) / baseViewport.width) });
          const canvas   = document.createElement('canvas');
          canvas.width   = viewport.width;
          canvas.height  = viewport.height;
          container.appendChild(canvas);
          return page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        });
      };

      let chain = Promise.resolve();
      for (let i = 1; i <= pdf.numPages; i++) {
        chain = chain.then(renderPage.bind(null, i));
      }
    }).catch(function (err) {
      loading.textContent = '無法載入 PDF：' + err.message;
    });
  </script>
</body>
</html>
